# Netlify: https://docs.netlify.com/configure-builds/file-based-configuration/
#
# Required for the “Request service” form: set VITE_WEB3FORMS_ACCESS_KEY in the Netlify UI
# (Site settings → Environment variables). Vite embeds it at build time — redeploy after adding/changing.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback: unknown paths still load the app (Vite + React)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
